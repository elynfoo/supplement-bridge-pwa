trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '20.x'
  backendAppName: 'supplement-bridge'
  azureServiceConnection: 'AzureServiceConnection'

stages:

# ── Stage 1: Build ────────────────────────────────────────────────────────────
- stage: Build
  displayName: Build Frontend & Backend
  jobs:

  - job: BuildFrontend
    displayName: Build React Frontend
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)
      displayName: Install Node.js

    - script: |
        npm ci
        npm run build
      workingDirectory: frontend
      displayName: Install & Build Frontend

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: frontend/build
        artifact: frontend-build
      displayName: Publish Frontend Artifact

  - job: BuildBackend
    displayName: Build Express Backend
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)
      displayName: Install Node.js

    - script: |
        npm ci
        npm test --if-present
      workingDirectory: backend
      displayName: Install & Test Backend

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: backend
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/backend.zip
        replaceExistingArchive: true
        excludePaths: backend/node_modules
      displayName: Zip Backend

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: $(Build.ArtifactStagingDirectory)/backend.zip
        artifact: backend-app
      displayName: Publish Backend Artifact

# ── Stage 2: Deploy to Dev ────────────────────────────────────────────────────
- stage: DeployDev
  displayName: Deploy to Dev
  dependsOn: Build
  condition: succeeded()
  jobs:

  - deployment: DeployBackendDev
    displayName: Deploy Backend → Dev
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: $(azureServiceConnection)
              appType: webAppLinux
              appName: supplement-bridge-dev
              package: $(Pipeline.Workspace)/backend-app/backend.zip
              runtimeStack: 'NODE|20-lts'
            displayName: Deploy Backend to App Service (Dev)

  - deployment: DeployFrontendDev
    displayName: Deploy Frontend → Dev
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureStaticWebApp@0
            inputs:
              azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_DEV)
              app_location: $(Pipeline.Workspace)/frontend-build
              skip_app_build: true
            displayName: Deploy Frontend to Static Web App (Dev)

# ── Stage 3: Deploy to Production ────────────────────────────────────────────
- stage: DeployProd
  displayName: Deploy to Production
  dependsOn: DeployDev
  condition: succeeded()
  jobs:

  - deployment: DeployBackendProd
    displayName: Deploy Backend → Prod
    environment: prod
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: $(azureServiceConnection)
              appType: webAppLinux
              appName: supplement-bridge
              package: $(Pipeline.Workspace)/backend-app/backend.zip
              runtimeStack: 'NODE|20-lts'
            displayName: Deploy Backend to App Service (Prod)

  - deployment: DeployFrontendProd
    displayName: Deploy Frontend → Prod
    environment: prod
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureStaticWebApp@0
            inputs:
              azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_PROD)
              app_location: $(Pipeline.Workspace)/frontend-build
              skip_app_build: true
            displayName: Deploy Frontend to Static Web App (Prod)
