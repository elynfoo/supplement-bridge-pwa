name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install and build frontend
      run: |
        cd frontend
        npm ci
        npm run build

    # Uncomment and configure after setting up Azure Static Web Apps
    # - name: Deploy to Azure Static Web Apps
    #   id: builddeploy
    #   uses: Azure/static-web-apps-deploy@v1
    #   with:
    #     azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    #     repo_token: ${{ secrets.GITHUB_TOKEN }}
    #     action: "upload"
    #     app_location: "/frontend/build"
    #     output_location: "."
    #     skip_app_build: true

  deploy-backend:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install backend dependencies
      run: |
        cd backend
        npm ci

    # Uncomment and configure after setting up Azure App Service
    # - name: Deploy to Azure App Service
    #   uses: azure/webapps-deploy@v2
    #   with:
    #     app-name: ${{ secrets.AZURE_APPSERVICE_NAME }}
    #     publish-profile: ${{ secrets.AZURE_APPSERVICE_PUBLISH_PROFILE }}
    #     package: ./backend

    - name: Verify backend
      run: |
        cd backend
        npm run start &
        sleep 5
        curl -f http://localhost:3000/health || true
