name: Infrastructure Deploy (Bicep)

on:
  push:
    branches: [main]
    paths: ['infra/**']
  pull_request:
    branches: [main]
    paths: ['infra/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
      what_if:
        description: 'Run what-if only (dry run)'
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  # ── Lint & validate Bicep ───────────────────────────────────────────────────
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep lint
        run: az bicep lint --file infra/main.bicep

      - name: Validate (dev)
        run: |
          az deployment group validate \
            --resource-group healthsupp-dev-rg \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.parameters.json

  # ── Deploy to dev (auto on push to main) ────────────────────────────────────
  deploy-dev:
    name: Deploy → Dev
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: dev
      url: ${{ steps.deploy.outputs.appServiceUrl }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-if preview
        run: |
          az deployment group what-if \
            --resource-group healthsupp-dev-rg \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.parameters.json

      - name: Deploy infrastructure
        id: deploy
        run: |
          OUTPUT=$(az deployment group create \
            --resource-group healthsupp-dev-rg \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.parameters.json \
            --output json)
          echo "appServiceUrl=$(echo $OUTPUT | jq -r '.properties.outputs.appServiceUrl.value')" >> $GITHUB_OUTPUT

  # ── Deploy to staging (manual trigger or auto after dev) ────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: deploy-dev
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.appServiceUrl }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_STAGING }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-if preview
        run: |
          az deployment group what-if \
            --resource-group healthsupp-staging-rg \
            --template-file infra/main.bicep \
            --parameters infra/parameters/staging.parameters.json

      - name: Deploy infrastructure
        id: deploy
        run: |
          OUTPUT=$(az deployment group create \
            --resource-group healthsupp-staging-rg \
            --template-file infra/main.bicep \
            --parameters infra/parameters/staging.parameters.json \
            --output json)
          echo "appServiceUrl=$(echo $OUTPUT | jq -r '.properties.outputs.appServiceUrl.value')" >> $GITHUB_OUTPUT

  # ── Deploy to prod (manual approval required via environment protection) ─────
  deploy-prod:
    name: Deploy → Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: ${{ steps.deploy.outputs.appServiceUrl }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-if preview
        run: |
          az deployment group what-if \
            --resource-group healthsupp-prod-rg \
            --template-file infra/main.bicep \
            --parameters infra/parameters/prod.parameters.json

      - name: Deploy infrastructure
        id: deploy
        run: |
          OUTPUT=$(az deployment group create \
            --resource-group healthsupp-prod-rg \
            --template-file infra/main.bicep \
            --parameters infra/parameters/prod.parameters.json \
            --output json)
          echo "appServiceUrl=$(echo $OUTPUT | jq -r '.properties.outputs.appServiceUrl.value')" >> $GITHUB_OUTPUT
